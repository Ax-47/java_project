<!doctype html>
<html
  xmlns:th="http://www.thymeleaf.org"
  th:replace="~{layout/main :: layout (~{::title}, ~{::section})}"
>
  <head>
    <title>ที่อยู่จัดส่ง - I BUILD CPU</title>
  </head>
  <body>
    <section>
      <div
        class="flex flex-col md:flex-row justify-between items-start md:items-center gap-6 mb-10"
      >
        <h2
          class="text-3xl md:text-4xl font-black flex items-center gap-4 text-gray-900"
        >
          <div class="p-3 bg-blue-50 rounded-2xl">
            <img
              th:src="@{/images/location-icon.png}"
              alt="Location Icon"
              class="w-8 h-8 md:w-10 md:h-10 object-contain"
            />
          </div>
          ที่อยู่จัดส่ง
        </h2>

        <a
          th:href="@{/addresses/create}"
          class="bg-[#FF6A00] text-white font-extrabold px-8 py-3.5 rounded-2xl hover:bg-[#e65f00] hover:shadow-xl hover:-translate-y-0.5 transition-all duration-300 text-lg flex items-center gap-2"
        >
          <svg
            xmlns="http://www.w3.org/2000/svg"
            class="h-6 w-6"
            fill="none"
            viewBox="0 0 24 24"
            stroke="currentColor"
          >
            <path
              stroke-linecap="round"
              stroke-linejoin="round"
              stroke-width="2.5"
              d="M12 4v16m8-8H4"
            />
          </svg>
          เพิ่มที่อยู่
        </a>
      </div>

      <div class="space-y-6">
        <th:block th:if="${addresses != null and !addresses.isEmpty()}">
          <div
            th:each="address, iter : ${addresses}"
            class="bg-white rounded-[2.5rem] p-8 shadow-sm border border-gray-100 hover:border-blue-200 hover:shadow-md transition-all duration-300 relative overflow-hidden group"
          >
            <div
              class="absolute top-0 left-0 w-2 h-full bg-blue-500 opacity-0 group-hover:opacity-100 transition-opacity"
            ></div>
            <div
              class="flex flex-col lg:flex-row items-center justify-between gap-8"
            >
              <div
                class="flex-1 grid grid-cols-1 md:grid-cols-12 gap-6 w-full items-start"
              >
                <div class="md:col-span-2 flex flex-col items-start gap-1">
                  <span
                    class="text-sm font-bold text-gray-400 uppercase tracking-widest block mb-1"
                    >ลำดับ</span
                  >
                  <div class="flex flex-col items-start gap-2">
                    <span
                      class="text-2xl font-black text-[#0175CC]"
                      th:text="${#numbers.formatInteger(iter.count, 2)}"
                      >01</span
                    >
                    <span
                      th:if="${address?.isDefault}"
                      class="bg-blue-100 text-[#0175CC] px-3 py-1 text-xs font-black rounded-full whitespace-nowrap"
                    >
                      ที่อยู่หลัก
                    </span>
                  </div>
                </div>

                <div class="md:col-span-7">
                  <span
                    class="text-sm font-bold text-gray-400 uppercase tracking-widest block mb-1"
                    >ที่อยู่จัดส่ง</span
                  >
                  <span
                    class="block font-black text-gray-900 mb-1"
                    th:text="${address?.fullName}"
                    >ชื่อ นามสกุล</span
                  >
                  <p
                    class="text-lg font-semibold text-gray-600 leading-snug"
                    th:text="${address?.addressLine1} + ' ' + ${address?.district} + ' ' + ${address?.province} + ' ' + ${address?.postalCode}"
                  >
                    รายละเอียดที่อยู่...
                  </p>
                </div>

                <div class="md:col-span-3">
                  <span
                    class="text-sm font-bold text-gray-400 uppercase tracking-widest block mb-1"
                    >เบอร์โทรศัพท์</span
                  >
                  <p
                    class="text-lg font-bold text-gray-700"
                    th:text="${address?.phoneNumber}"
                  >
                    081-234-5678
                  </p>
                </div>
              </div>

              <div
                class="flex gap-3 shrink-0 w-full lg:w-auto border-t lg:border-t-0 pt-6 lg:pt-0"
              >
                <a
                  th:href="@{/addresses/{id}/edit(id=${address?.id})}"
                  class="flex-1 lg:flex-none text-center bg-[#0175CC] text-white font-bold px-8 py-3 rounded-2xl hover:bg-blue-700 transition-colors shadow-sm"
                >
                  แก้ไข
                </a>

                <form
                  th:action="@{/addresses/{id}/delete(id=${address?.id})}"
                  method="post"
                  class="flex-1 lg:flex-none flex"
                  onsubmit="
                    return confirm('คุณแน่ใจหรือไม่ที่จะลบที่อยู่นี้?');
                  "
                >
                  
                  <input type="hidden" name="_method" value="DELETE" />
                  <button
                    type="submit"
                    class="w-full bg-red-50 text-red-500 font-bold px-8 py-3 rounded-2xl hover:bg-red-500 hover:text-white transition-all border border-red-100"
                  >
                    ลบ
                  </button>
                </form>
              </div>
            </div>
          </div>
        </th:block>
        <th:block
          th:unless="${addresses != null and !#lists.isEmpty(addresses)}"
        >
          <div th:replace="~{fragments/notFound :: not-found-address}"></div>
        </th:block>
      </div>
    </section>
  </body>
</html>
