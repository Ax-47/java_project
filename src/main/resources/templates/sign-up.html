<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Khula:wght@400;600;800&display=swap" rel="stylesheet">
    <style>body { font-family: 'Khula', sans-serif; }</style>
    <title>Sign Up - I BUILD CPU</title>
</head>
<body class="bg-white text-black m-0 p-0">
    
    <div th:replace="~{fragments/header :: navbar}"></div>

    <div class="text-center mt-12 mb-8">
        <h2 class="text-3xl font-bold">ลงทะเบียน</h2>
    </div>

    <div class="bg-[#FCF2D9] rounded-[2.5rem] p-10 max-w-2xl mx-auto shadow-sm mb-6">
        <form action="#" method="post" class="space-y-6">
            
            <div class="grid grid-cols-2 gap-6">
                <div>
                    <label class="block text-xl font-bold mb-2">ชื่อ</label>
                    <input type="text" placeholder="ชื่อ" class="w-full px-5 py-3 rounded-full border-none focus:outline-none focus:ring-2 focus:ring-[#0175CC] text-gray-700 shadow-sm">
                </div>
                <div>
                    <label class="block text-xl font-bold mb-2">นามสกุล</label>
                    <input type="text" placeholder="นามสกุล" class="w-full px-5 py-3 rounded-full border-none focus:outline-none focus:ring-2 focus:ring-[#0175CC] text-gray-700 shadow-sm">
                </div>
            </div>

            <div class="grid grid-cols-2 gap-6">
                <div>
                    <label class="block text-xl font-bold mb-2">เบอร์โทรศัพท์</label>
                    <input type="tel" placeholder="เบอร์โทรศัพท์" class="w-full px-5 py-3 rounded-full border-none focus:outline-none focus:ring-2 focus:ring-[#0175CC] text-gray-700 shadow-sm">
                </div>
                <div>
                    <label class="block text-xl font-bold mb-2">วันเกิด</label>
                    <input type="date" class="w-full px-5 py-3 rounded-full border-none focus:outline-none focus:ring-2 focus:ring-[#0175CC] text-gray-500 bg-white shadow-sm">
                </div>
            </div>

            <div>
                <label class="block text-xl font-bold mb-2">อีเมล</label>
                <input type="email" placeholder="อีเมล" class="w-full px-5 py-3 rounded-full border-none focus:outline-none focus:ring-2 focus:ring-[#0175CC] text-gray-700 shadow-sm">
            </div>

            <div>
                <label class="block text-xl font-bold mb-2">รหัสผ่าน</label>
                <input type="password" placeholder="รหัสผ่าน" class="w-full px-5 py-3 rounded-full border-none focus:outline-none focus:ring-2 focus:ring-[#0175CC] text-gray-700 shadow-sm">
            </div>

            <div>
                <label class="block text-xl font-bold mb-2">ยืนยันรหัสผ่าน</label>
                <input type="password" placeholder="ยืนยันรหัสผ่าน" class="w-full px-5 py-3 rounded-full border-none focus:outline-none focus:ring-2 focus:ring-[#0175CC] text-gray-700 shadow-sm">
            </div>

            <div class="pt-4">
                <button type="submit" class="w-full bg-[#FF6A00] text-white font-bold text-xl py-3 rounded-full hover:opacity-90 transition shadow-sm">
                    สมัครสมาชิก
                </button>
            </div>
            
        </form>
    </div>

    <div class="text-center mb-16 text-lg font-medium">
        หรือ เป็นสมาชิกอยู่แล้ว? 
        <a th:href="@{/sign-in}" class="text-[#0175CC] border-b border-[#0175CC] pb-0.5 hover:opacity-80 transition ml-2">เข้าสู่ระบบ</a>
    </div>

</body>
</html>
