<!doctype html>
<html
  lang="en"
  xmlns:th="http://www.thymeleaf.org"
  th:replace="~{admin/layout :: layout(~{::#main-content}, ~{::#custom-scripts})}"
>
  <head>
    <title>Create New Category</title>
  </head>
  <body>
    <div id="main-content" class="max-w-2xl mx-auto">
      
      <div class="mb-6">
        <a
          href="/admin?tab=categories"
          class="text-blue-600 hover:text-blue-800 flex items-center text-sm font-medium"
        >
          <svg
            class="w-4 h-4 mr-1"
            fill="none"
            stroke="currentColor"
            viewBox="0 0 24 24"
          >
            <path
              stroke-linecap="round"
              stroke-linejoin="round"
              stroke-width="2"
              d="M10 19l-7-7m0 0l7-7m-7 7h18"
            ></path>
          </svg>
          Back to Categories
        </a>
      </div>

      <div class="bg-white shadow-sm rounded-lg border border-gray-200 overflow-hidden">
        
        <div class="px-6 py-4 border-b border-gray-200 bg-gray-50 flex justify-between items-center">
          <h2 class="text-xl font-bold text-gray-800">Create New Category</h2>
        </div>

        <form
          th:action="@{/admin/categories/create}"
          method="post"
          class="p-6"
        >

          <div class="space-y-6">
            
            <div>
              <label
                for="name"
                class="block text-sm font-medium text-gray-700 mb-1"
                >Category Name <span class="text-red-500">*</span></label
              >
              <input
                type="text"
                id="name"
                name="name"
                required
                maxlength="100"
                class="w-full px-4 py-2 border border-gray-300 rounded-md focus:ring-blue-500 focus:border-blue-500 outline-none transition"
                placeholder="e.g. Electronics"
              />
              <p class="text-xs text-gray-500 mt-1">
                Maximum 100 characters.
              </p>
            </div>

          </div>

          <div
            class="mt-8 pt-5 border-t border-gray-200 flex justify-end space-x-3"
          >
            <a
              href="/admin?tab=categories"
              class="px-5 py-2 border border-gray-300 text-gray-700 rounded-md hover:bg-gray-50 font-medium transition"
            >
              Cancel
            </a>
            <button
              type="submit"
              class="px-5 py-2 bg-green-600 text-white rounded-md hover:bg-green-700 font-medium transition shadow-sm"
            >
              Create Category
            </button>
          </div>
        </form>
      </div>
    </div>
    <th:block id="custom-scripts">
    </th:block>
  </body>
</html>
