<!doctype html>
<html
  lang="en"
  xmlns:th="http://www.thymeleaf.org"
  th:replace="~{admin/layout :: layout(~{::#main-content}, ~{::#custom-scripts})}"
>
  <head>
    <title>Manage Images</title>
  </head>
  <body>
    <div id="main-content" class="max-w-5xl mx-auto">
      <div class="flex items-center justify-between mb-6">
        <div class="flex items-center space-x-4">
          <a
            th:href="@{/admin/products/edit/{id}(id=${product.id})}"
            class="p-2 bg-white border border-gray-300 rounded-full hover:bg-gray-50 transition shadow-sm"
          >
            <svg
              class="w-5 h-5 text-gray-600"
              fill="none"
              stroke="currentColor"
              viewBox="0 0 24 24"
            >
              <path
                stroke-linecap="round"
                stroke-linejoin="round"
                stroke-width="2"
                d="M10 19l-7-7m0 0l7-7m-7 7h18"
              ></path>
            </svg>
          </a>
          <div>
            <h2
              class="text-2xl font-bold text-gray-800"
              th:text="'Images: ' + ${product.name}"
            >
              Manage Images
            </h2>
            <p
              class="text-sm text-gray-500"
              th:text="'Product ID: ' + ${product.id}"
            >
              ID: ...
            </p>
          </div>
        </div>

        <button
          onclick="saveNewOrder()"
          class="bg-green-600 hover:bg-green-700 text-white px-4 py-2 rounded-md font-semibold shadow-sm transition"
        >
          Update All Changes
        </button>
      </div>

      <div
        class="bg-white p-6 rounded-lg border-2 border-dashed border-gray-300 mb-8 hover:border-blue-500 transition group"
      >
        <div class="text-center">
          <svg
            class="mx-auto h-12 w-12 text-gray-400 group-hover:text-blue-500 transition"
            stroke="currentColor"
            fill="none"
            viewBox="0 0 48 48"
          >
            <path
              d="M28 8H12a4 4 0 00-4 4v20m32-12v8m0 0v8a4 4 0 01-4 4H12a4 4 0 01-4-4v-4m32-4l-3.172-3.172a4 4 0 00-5.656 0L28 28M8 32l9.172-9.172a4 4 0 015.656 0L28 28m0 0l4 4m4-24h8m-4-4v8m-12 4h.02"
              stroke-width="2"
              stroke-linecap="round"
              stroke-linejoin="round"
            />
          </svg>
          <div class="mt-4 flex text-sm text-gray-600 justify-center">
            <label
              for="file-upload"
              class="relative cursor-pointer bg-white rounded-md font-medium text-blue-600 hover:text-blue-500 focus-within:outline-none"
            >
              <span>Upload a file</span>
              <input
                id="file-upload"
                name="file-upload"
                type="file"
                class="sr-only"
                multiple
                onchange="handleFileUpload(event)"
              />
            </label>
            <p class="pl-1">or drag and drop</p>
          </div>
          <p class="text-xs text-gray-500 mt-2">PNG, JPG, GIF up to 10MB</p>
        </div>
      </div>

      <div
        id="image-container"
        class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 lg:grid-cols-5 gap-4"
      >
        <div
          th:each="img, stat : ${images}"
          th:id="'img-card-' + ${img.id}"
          th:data-id="${img.id}"
          class="image-card relative bg-white border border-gray-200 rounded-lg overflow-hidden shadow-sm group"
        >
          <img
            th:src="${img.medium}"
            class="w-full h-40 object-cover"
            alt="Product thumbnail"
          />

          <button
            type="button"
            th:data-id="${img.id}"
            onclick="deleteImage(this.getAttribute('data-id'))"
            class="absolute top-2 right-2 p-1.5 bg-red-600 text-white rounded-full opacity-0 group-hover:opacity-100 transition shadow-md"
          >
            <svg
              class="w-4 h-4"
              fill="none"
              stroke="currentColor"
              viewBox="0 0 24 24"
            >
              <path
                stroke-linecap="round"
                stroke-linejoin="round"
                stroke-width="2"
                d="M6 18L18 6M6 6l12 12"
              ></path>
            </svg>
          </button>

          <div
            class="p-2 bg-gray-50 border-t border-gray-100 flex items-center justify-between"
          >
            <span class="text-xs font-bold text-gray-400">ORDER</span>
            <input
              type="number"
              th:value="${stat.index + 1}"
              class="sort-input w-12 text-center text-xs border border-gray-300 rounded focus:ring-1 focus:ring-blue-500"
            />
          </div>
        </div>

        <div
          th:if="${#lists.isEmpty(images)}"
          id="empty-state"
          class="col-span-full py-20 text-center text-gray-400"
        >
          No images found for this product.
        </div>
      </div>
    </div>

    <th:block id="custom-scripts">
      <script th:inline="javascript">
        const productId = /*[[${product.id}]]*/ "uuid";
        const apiBaseUrl = `/api/products/${productId}/images`;

        async function handleFileUpload(event) {
          const files = event.target.files;
          if (files.length === 0) return;

          for (let i = 0; i < files.length; i++) {
            const formData = new FormData();
            formData.append("file", files[i]);
            formData.append("sortOrder", i + 1);
            try {
              const response = await fetch(`${apiBaseUrl}`, {
                method: "POST",
                body: formData,
              });
              if (response.ok || response.status === 204) {
                document.getElementById(`img-card-${imageId}`).remove();
              } else {
                alert("Delete failed");
              }
            } catch (error) {
              console.error(error);
            }
          }
          location.reload();
        }

        async function deleteImage(imageId) {
          if (!confirm("Remove this image?")) return;

          try {
            const response = await fetch(`${apiBaseUrl}/${imageId}`, {
              method: "DELETE",
            });
            if (response.ok || response.status === 204) {
              document.getElementById(`img-card-${imageId}`).remove();
            } else {
              alert("Delete failed");
            }
          } catch (error) {
            console.error(error);
          }
        }

        async function saveNewOrder() {
          const cards = document.querySelectorAll(".image-card");
          const payload = Array.from(cards).map((card) => ({
            imageId: card.getAttribute("data-id"),
            sortOrder: parseInt(card.querySelector(".sort-input").value, 10),
          }));

          try {
            const response = await fetch(`${apiBaseUrl}/reorder`, {
              method: "PATCH",
              headers: { "Content-Type": "application/json" },
              body: JSON.stringify(payload),
            });

            if (response.ok) {
              alert("Order updated successfully!");
              location.reload();
            } else {
              alert("Failed to update order");
            }
          } catch (error) {
            console.error(error);
          }
        }
      </script>
    </th:block>
  </body>
</html>
