<!doctype html>
<html
  lang="en"
  xmlns:th="http://www.thymeleaf.org"
  th:replace="~{admin/layout :: layout(~{::#main-content}, ~{::#custom-scripts})}"
>
  <head>
    <title>Create New Product</title>
  </head>
  <body>
    <div id="main-content" class="max-w-4xl mx-auto">
      
      <div class="mb-6">
        <a
          href="/admin?tab=products"
          class="text-blue-600 hover:text-blue-800 flex items-center text-sm font-medium"
        >
          <svg
            class="w-4 h-4 mr-1"
            fill="none"
            stroke="currentColor"
            viewBox="0 0 24 24"
          >
            <path
              stroke-linecap="round"
              stroke-linejoin="round"
              stroke-width="2"
              d="M10 19l-7-7m0 0l7-7m-7 7h18"
            ></path>
          </svg>
          Back to Products
        </a>
      </div>

      <div class="bg-white shadow-sm rounded-lg border border-gray-200 overflow-hidden">
        
        <div class="px-6 py-4 border-b border-gray-200 bg-gray-50 flex justify-between items-center">
          <h2 class="text-xl font-bold text-gray-800">Create New Product</h2>
          <span class="text-sm text-blue-600 bg-blue-100 px-2 py-1 rounded font-medium">Draft</span>
        </div>

        <form
          th:action="@{/admin/products/create}"
          method="post"
          class="p-6"
        >
          <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
            
            <div class="md:col-span-2 space-y-6">
              
              <div>
                <label
                  for="name"
                  class="block text-sm font-medium text-gray-700 mb-1"
                  >Product Name <span class="text-red-500">*</span></label
                >
                <input
                  type="text"
                  id="name"
                  name="name"
                  required
                  maxlength="255"
                  class="w-full px-4 py-2 border border-gray-300 rounded-md focus:ring-blue-500 focus:border-blue-500 outline-none transition"
                  placeholder="e.g. iPhone 15 Pro"
                />
                <p class="text-xs text-gray-500 mt-1">
                  Maximum 255 characters.
                </p>
              </div>

              <div>
                <label
                  for="price"
                  class="block text-sm font-medium text-gray-700 mb-1"
                  >Price <span class="text-red-500">*</span></label
                >
                <div class="relative">
                  <span
                    class="absolute inset-y-0 left-0 flex items-center pl-3 text-gray-500"
                    >฿</span
                  >
                  <input
                    type="number"
                    step="0.01"
                    min="0"
                    id="price"
                    name="price"
                    required
                    class="w-full pl-8 pr-4 py-2 border border-gray-300 rounded-md focus:ring-blue-500 focus:border-blue-500 outline-none transition"
                    placeholder="0.00"
                  />
                </div>
              </div>

              <div>
                <label
                  for="description"
                  class="block text-sm font-medium text-gray-700 mb-1"
                  >Description</label
                >
                <textarea
                  id="description"
                  name="description"
                  rows="4"
                  maxlength="511"
                  class="w-full px-4 py-2 border border-gray-300 rounded-md focus:ring-blue-500 focus:border-blue-500 outline-none transition"
                  placeholder="Write a brief description about the product..."
                ></textarea>
                <div class="flex justify-between text-xs text-gray-500 mt-1">
                  <span>Optional</span>
                  <span id="desc-counter">0 / 511 characters.</span>
                </div>
              </div>
            </div>

            <div class="space-y-6">
              <div class="bg-blue-50 p-5 rounded-md border border-blue-100 text-center flex flex-col items-center justify-center h-full">
                <svg class="w-12 h-12 text-blue-400 mb-3" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                  <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M4 16l4.586-4.586a2 2 0 012.828 0L16 16m-2-2l1.586-1.586a2 2 0 012.828 0L20 14m-6-6h.01M6 20h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z"></path>
                </svg>
                <h3 class="text-sm font-bold text-blue-800 mb-2">
                  Images & Categories
                </h3>
                <p class="text-sm text-blue-600 leading-relaxed">
                  These features will be unlocked after you create the initial product record. Fill in the details on the left and click "Create Product" first.
                </p>
              </div>
            </div>

          </div>

          <div
            class="mt-8 pt-5 border-t border-gray-200 flex justify-end space-x-3"
          >
            <a
              href="/admin?tab=products"
              class="px-5 py-2 border border-gray-300 text-gray-700 rounded-md hover:bg-gray-50 font-medium transition"
            >
              Cancel
            </a>
            <button
              type="submit"
              class="px-5 py-2 bg-green-600 text-white rounded-md hover:bg-green-700 font-medium transition shadow-sm"
            >
              Create Product
            </button>
          </div>
        </form>
      </div>
    </div>

    <th:block id="custom-scripts">
      <script>
        const descInput = document.getElementById('description');
        const descCounter = document.getElementById('desc-counter');
        const maxDesc = 511;

        if (descInput) {
          descInput.addEventListener('input', function() {
            const currentLength = this.value.length;
            descCounter.textContent = `${currentLength} / ${maxDesc} characters.`;
            if (currentLength >= maxDesc) {
              descCounter.classList.add('text-red-500');
            } else {
              descCounter.classList.remove('text-red-500');
            }
          });
        }
      </script>
    </th:block>
  </body>
</html>
