<!doctype html>
<html
  lang="en"
  xmlns:th="http://www.thymeleaf.org"
  th:replace="~{admin/layout :: layout(~{::#main-content}, ~{::#custom-scripts})}"
>
  <head>
    <title>Edit Product</title>
  </head>
  <body>
    <div id="main-content" class="max-w-4xl mx-auto">
      <div class="mb-6">
        <a
          href="/admin?tab=products"
          class="text-blue-600 hover:text-blue-800 flex items-center text-sm font-medium"
        >
          <svg
            class="w-4 h-4 mr-1"
            fill="none"
            stroke="currentColor"
            viewBox="0 0 24 24"
          >
            <path
              stroke-linecap="round"
              stroke-linejoin="round"
              stroke-width="2"
              d="M10 19l-7-7m0 0l7-7m-7 7h18"
            ></path>
          </svg>
          Back to Products
        </a>
      </div>

      <div
        class="bg-white shadow-sm rounded-lg border border-gray-200 overflow-hidden"
      >
        <div
          class="px-6 py-4 border-b border-gray-200 bg-gray-50 flex justify-between items-center"
        >
          <h2 class="text-xl font-bold text-gray-800">Edit Product</h2>
          <span class="text-sm text-gray-500" th:text="'ID: ' + ${product.id}"
            >ID: 1234-5678...</span
          >
        </div>

        <form
          th:action="@{/admin/products/{id}/edit(id=${product.id})}"
          method="post"
          class="p-6"
        >
          <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
            <div class="md:col-span-2 space-y-6">
              <div>
                <label
                  for="name"
                  class="block text-sm font-medium text-gray-700 mb-1"
                  >Product Name <span class="text-red-500">*</span></label
                >
                <input
                  type="text"
                  id="name"
                  name="name"
                  required
                  maxlength="255"
                  th:value="${product.name}"
                  class="w-full px-4 py-2 border border-gray-300 rounded-md focus:ring-blue-500 focus:border-blue-500 outline-none transition"
                  placeholder="Enter product name"
                />
                <p class="text-xs text-gray-500 mt-1">
                  Maximum 255 characters.
                </p>
              </div>

              <div>
                <label
                  for="price"
                  class="block text-sm font-medium text-gray-700 mb-1"
                  >Price <span class="text-red-500">*</span></label
                >
                <div class="relative">
                  <span
                    class="absolute inset-y-0 left-0 flex items-center pl-3 text-gray-500"
                    >฿</span
                  >
                  <input
                    type="number"
                    step="0.01"
                    min="0"
                    id="price"
                    name="price"
                    required
                    th:value="${product.price.getValue()}"
                    class="w-full pl-8 pr-4 py-2 border border-gray-300 rounded-md focus:ring-blue-500 focus:border-blue-500 outline-none transition"
                    placeholder="0.00"
                  />
                </div>
              </div>

              <div>
                <label
                  for="description"
                  class="block text-sm font-medium text-gray-700 mb-1"
                  >Description</label
                >
                <textarea
                  id="description"
                  name="description"
                  rows="4"
                  maxlength="511"
                  th:text="${product.description}"
                  class="w-full px-4 py-2 border border-gray-300 rounded-md focus:ring-blue-500 focus:border-blue-500 outline-none transition"
                  placeholder="Product description..."
                ></textarea>
                <div class="flex justify-between text-xs text-gray-500 mt-1">
                  <span>Optional</span>
                  <span id="desc-counter">Maximum 511 characters.</span>
                </div>
              </div>
            </div>

            <div class="space-y-6">
              <div class="bg-gray-50 p-4 rounded-md border border-gray-200">
                <h3 class="text-sm font-bold text-gray-800 mb-3">
                  Product Categories
                </h3>

                <ul id="category-list" class="space-y-2 mb-3">
                  <li
                    th:each="cat : ${productCategories}"
                    th:id="'cat-' + ${cat.id}"
                    class="flex justify-between items-center bg-white border border-gray-200 px-3 py-2 rounded text-sm"
                  >
                    <span th:text="${cat.categoryName}">Electronics</span>
                    <button
                      type="button"
                      th:data-id="${cat.id}"
                      onclick="removeCategory(this.getAttribute('data-id'))"
                      class="text-red-500 hover:text-red-700"
                    >
                      <svg
                        class="w-4 h-4"
                        fill="none"
                        stroke="currentColor"
                        viewBox="0 0 24 24"
                      >
                        <path
                          stroke-linecap="round"
                          stroke-linejoin="round"
                          stroke-width="2"
                          d="M6 18L18 6M6 6l12 12"
                        ></path>
                      </svg>
                    </button>
                  </li>
                </ul>

                <div class="flex space-x-2">
                  <select
                    id="new-category-select"
                    class="flex-1 border border-gray-300 rounded-md px-2 py-1 text-sm focus:ring-blue-500 outline-none"
                  >
                    <option value="" disabled selected>
                      Select category...
                    </option>
                    <option
                      th:each="allCat : ${allCategories}"
                      th:value="${allCat.id}"
                      th:text="${allCat.categoryName}"
                    ></option>
                  </select>
                  <button
                    type="button"
                    onclick="addCategory()"
                    class="bg-blue-600 text-white px-3 py-1 rounded text-sm hover:bg-blue-700 transition"
                  >
                    Add
                  </button>
                </div>
              </div>

              <div class="bg-gray-50 p-4 rounded-md border border-gray-200">
                <div class="flex justify-between items-center mb-3">
                  <h3 class="text-sm font-bold text-gray-800">
                    Product Images
                  </h3>
                  <button
                    type="button"
                    onclick="saveImageOrder()"
                    class="text-xs bg-green-600 text-white px-2 py-1 rounded hover:bg-green-700 transition shadow-sm"
                  >
                    Save Order
                  </button>
                </div>

                <div id="image-gallery" class="grid grid-cols-2 gap-2 mb-3">
                  <div
                    th:each="img, imgStat : ${images}"
                    th:id="'img-' + ${img.id}"
                    th:data-image-id="${img.id}"
                    class="image-item relative border border-gray-300 rounded-md overflow-hidden group cursor-move"
                  >
                    <img
                      th:src="${img.thumbnail}"
                      class="w-full h-24 object-cover"
                      alt="Product Image"
                    />

                    <div
                      class="absolute inset-0 bg-black bg-opacity-40 flex items-center justify-center opacity-0 group-hover:opacity-100 transition"
                    >
                      <button
                        type="button"
                        th:data-id="${img.id}"
                        onclick="deleteImage(this.getAttribute('data-id'))"
                        class="text-white bg-red-600 rounded-full p-1.5 hover:bg-red-700 shadow"
                        title="Delete Image"
                      >
                        <svg
                          class="w-4 h-4"
                          fill="none"
                          stroke="currentColor"
                          viewBox="0 0 24 24"
                        >
                          <path
                            stroke-linecap="round"
                            stroke-linejoin="round"
                            stroke-width="2"
                            d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"
                          ></path>
                        </svg>
                      </button>
                    </div>
                    <input
                      type="number"
                      th:value="${imgStat.index + 1}"
                      class="sort-order-input absolute top-1 left-1 w-8 h-6 text-xs text-center rounded border border-gray-300 bg-white opacity-90"
                    />
                  </div>
                </div>

                <a
                  th:href="@{/admin/products/{id}/images(id=${product.id})}"
                  class="block w-full text-center py-2 border-2 border-dashed border-gray-300 rounded-md text-sm text-gray-600 hover:border-blue-500 hover:text-blue-500 transition"
                >
                  + Manage Images
                </a>
              </div>

              <div
                class="bg-gray-50 p-4 rounded-md border border-gray-200 text-sm"
              >
                <div class="mb-2">
                  <span class="block text-gray-500">Created By</span>
                  <span
                    class="font-medium text-gray-800"
                    th:text="${product.createdBy}"
                    >UUID</span
                  >
                </div>
                <div class="mb-2">
                  <span class="block text-gray-500">Created At</span>
                  <span
                    class="font-medium text-gray-800"
                    th:text="${#temporals.format(product.createdAt, 'dd-MMM-yyyy HH:mm')}"
                    >Date</span
                  >
                </div>
                <div>
                  <span class="block text-gray-500">Last Updated</span>
                  <span
                    class="font-medium text-gray-800"
                    th:text="${#temporals.format(product.updatedAt, 'dd-MMM-yyyy HH:mm')}"
                    >Date</span
                  >
                </div>
              </div>
            </div>
          </div>

          <div
            class="mt-8 pt-5 border-t border-gray-200 flex justify-end space-x-3"
          >
            <a
              href="/admin?tab=products"
              class="px-5 py-2 border border-gray-300 text-gray-700 rounded-md hover:bg-gray-50 font-medium transition"
            >
              Cancel
            </a>
            <button
              type="submit"
              class="px-5 py-2 bg-blue-600 text-white rounded-md hover:bg-blue-700 font-medium transition shadow-sm"
            >
              Save Changes
            </button>
          </div>
        </form>
      </div>
    </div>

    <th:block id="custom-scripts">
      <script th:inline="javascript">
        const productId = /*[[${product.id}]]*/ "default-uuid";
        const apiBaseUrl = `/api/products/${productId}`;

        async function addCategory() {
          const select = document.getElementById("new-category-select");
          const categoryId = select.value;
          if (!categoryId) return alert("Please select a category first.");

          try {
            const response = await fetch(
              `${apiBaseUrl}/categories/${categoryId}`,
              { method: "POST" },
            );
            if (response.ok) {
              alert("Category added successfully!");
              location.reload();
            } else {
              alert("Failed to add category.");
            }
          } catch (error) {
            console.error("Error adding category:", error);
          }
        }

        async function removeCategory(categoryId) {
          if (!confirm("Are you sure you want to remove this category?"))
            return;

          try {
            const response = await fetch(
              `${apiBaseUrl}/categories/${categoryId}`,
              { method: "DELETE" },
            );
            if (response.ok || response.status === 204) {
              document.getElementById(`cat-${categoryId}`).remove();
            } else {
              alert("Failed to remove category.");
            }
          } catch (error) {
            console.error("Error removing category:", error);
          }
        }

        async function deleteImage(imageId) {
          if (!confirm("Are you sure you want to delete this image?")) return;

          try {
            const response = await fetch(`${apiBaseUrl}/images/${imageId}`, {
              method: "DELETE",
            });
            if (response.ok || response.status === 204) {
              document.getElementById(`img-${imageId}`).remove();
            } else {
              alert("Failed to delete image.");
            }
          } catch (error) {
            console.error("Error deleting image:", error);
          }
        }

        async function saveImageOrder() {
          const imageElements = document.querySelectorAll(".image-item");
          const reorderRequest = [];

          imageElements.forEach((el) => {
            const imageId = el.getAttribute("data-image-id");
            const sortOrderVal = el.querySelector(".sort-order-input").value;

            reorderRequest.push({
              imageId: imageId,
              sortOrder: parseInt(sortOrderVal, 10),
            });
          });

          try {
            const response = await fetch(`${apiBaseUrl}/images/reorder`, {
              method: "PATCH",
              headers: { "Content-Type": "application/json" },
              body: JSON.stringify(reorderRequest),
            });

            if (response.ok) {
              alert("Image order saved successfully!");
            } else {
              alert("Failed to save image order.");
            }
          } catch (error) {
            console.error("Error saving image order:", error);
          }
        }
      </script>
    </th:block>
  </body>
</html>
