<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Khula:wght@400;600;800&display=swap" rel="stylesheet">
    <style>body { font-family: 'Khula', sans-serif; }</style>
    <title>Profile - I BUILD CPU</title>
</head>
<body class="bg-white text-black m-0 p-0">
    
    <div th:replace="~{fragments/header :: navbar}"></div>

    <div class="px-12 py-8 flex justify-between items-center max-w-5xl mx-auto mt-4">
        <h2 class="text-3xl font-bold flex items-center gap-4">
            <img th:src="@{/images/user-icon.png}" alt="User Icon" class="w-10 h-10 object-contain">
            ข้อมูลส่วนตัว
        </h2>
        
        <div class="flex gap-4">
            <a href="#" class="bg-[#0175CC] text-white font-bold px-8 py-2 rounded-xl hover:opacity-90 transition shadow-sm text-lg">แก้ไข</a>
            <a th:href="@{/cash}" class="bg-[#FF6A00] text-white font-bold px-8 py-2 rounded-xl hover:opacity-90 transition shadow-sm text-lg">เติมพอยท์</a>
        </div>
    </div>

    <div class="bg-[#FCF2D9] rounded-[2rem] p-10 max-w-5xl mx-auto shadow-sm flex flex-col md:flex-row items-center gap-12 mb-16">
        
        <div class="shrink-0">
            <img th:src="@{/images/profile-pic.png}" alt="Profile" class="w-48 h-48 rounded-[2rem] object-cover bg-white shadow-sm">
        </div>
        
        <div class="flex flex-1 items-center justify-between w-full">
            
            <div class="flex flex-col gap-10 text-2xl font-normal w-1/2 pl-4">
                <div>UserName</div>
                <div>Email</div>
            </div>
            
            <div class="w-1.5 h-32 bg-[#0175CC] rounded-full mx-4"></div>
            
            <div class="flex flex-col gap-10 text-2xl font-normal w-1/2 pl-8">
                <div>Tel.</div>
                <div>BirthDay</div>
            </div>
            
        </div>
    </div>

</body>
</html>
