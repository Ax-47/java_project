<!doctype html>
<html
  xmlns:th="http://www.thymeleaf.org"
  th:replace="~{layout/main :: layout (~{::title}, ~{::section})}"
>
  <head>
    <title>เกิดข้อผิดพลาด - I BUILD CPU</title>
  </head>
  <section class="max-w-2xl mx-auto px-4 py-20 md:py-32 text-center">
    
    <div class="w-24 h-24 bg-orange-50 rounded-full flex items-center justify-center mx-auto mb-6 shadow-sm border border-orange-100">
      <svg class="w-12 h-12 text-[#FF6A00]" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z"></path>
      </svg>
    </div>

    <h1 class="text-3xl md:text-4xl font-black text-gray-900 tracking-tight mb-2">ข้อมูลไม่ถูกต้อง</h1>
    <p class="text-lg text-gray-500 font-medium mb-8" th:text="${errorMessage != null ? errorMessage : 'คำขอของคุณไม่ถูกต้อง กรุณาตรวจสอบและลองใหม่อีกครั้ง'}">
      คำขอของคุณไม่ถูกต้อง กรุณาตรวจสอบและลองใหม่อีกครั้ง
    </p>

    <div class="flex justify-center gap-4">
      <button onclick="history.back()" class="bg-white border border-gray-200 text-gray-700 px-8 py-3 rounded-full font-bold hover:bg-gray-50 transition-colors shadow-sm">
        กลับหน้าก่อนหน้า
      </button>
      <a th:href="@{/}" class="bg-[#0175CC] text-white px-8 py-3 rounded-full font-bold hover:bg-blue-600 transition-colors shadow-sm">
        ไปที่หน้าแรก
      </a>
    </div>

  </section>
</html>
