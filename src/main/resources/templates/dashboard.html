<!doctype html>
<html xmlns:th="http://www.thymeleaf.org">
  <head>
    <title>Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
  </head>

  <body class="bg-gray-100">
    <!-- Navbar -->
    <nav class="bg-gray-900 text-white p-4 flex justify-between">
      <h1 class="text-xl font-bold">Dashboard</h1>

      <div class="flex items-center gap-4">
        <span class="text-sm">
          Welcome <b th:text="${user.username}"></b>
        </span>

        <button
          onclick="logout()"
          class="bg-red-500 px-3 py-1 rounded hover:bg-red-600"
        >
          Logout
        </button>
      </div>
    </nav>

    <!-- Content -->
    <div class="max-w-3xl mx-auto mt-10 space-y-6">

      <!-- User Card -->
      <div class="bg-white shadow rounded p-6">
        <h2 class="text-xl font-bold mb-4">User Information</h2>

        <div class="bg-gray-100 p-4 rounded text-sm space-y-2">
          <p>
            <b>Username:</b>
            <span th:text="${user.username}"></span>
          </p>

          <p>
            <b>User ID:</b>
            <span th:text="${user.id}"></span>
          </p>

          <p>
            <b>Role:</b>
            <span
              class="bg-blue-500 text-white px-2 py-1 rounded text-xs"
              th:text="${user.role}"
            ></span>
          </p>
        </div>
      </div>

      <!-- Admin Card -->
      <div
        class="bg-white shadow rounded p-6"
        th:if="${user.role == 'ADMIN'}"
      >
        <h2 class="text-xl font-bold mb-4">Admin Data</h2>

        <p class="text-sm text-gray-600">
          Only admins can see this section.
        </p>
      </div>
    </div>

    <script src="/js/auth.js"></script>
  </body>
</html>
