<!doctype html>
<html xmlns:th="http://www.thymeleaf.org">
  <body>
    <div
      th:fragment="category-nav(categories, activeCategoryId)"
      class="pt-8 pb-6"
      th:if="${categories != null}"
    >
      <h2 class="text-2xl font-bold flex items-center gap-3 mb-6">
        <img
          th:src="@{/images/category-icon.png}"
          alt="Category Icon"
          class="w-6 h-6 object-contain"
        />
        Browse Categories
      </h2>

      <div class="flex gap-3 overflow-x-auto pb-2 scrollbar-hide">
        <a
          th:href="@{/}"
          th:class="${activeCategoryId == null}
            ? 'px-6 py-2 rounded-full bg-[#0175CC] text-white text-sm font-bold shadow-md transition-all'
            : 'px-6 py-2 rounded-full bg-white border-2 border-gray-200 text-gray-600 text-sm font-semibold hover:border-[#0175CC] hover:text-[#0175CC] transition-all'"
        >
          All
        </a>

        <a
          th:each="category : ${categories}"
          th:href="@{'/?activeCategoryId=' + ${category.id}}"
          th:text="${category.name}"
          th:class="${activeCategoryId == category.id}
            ? 'px-6 py-2 rounded-full bg-[#0175CC] text-white text-sm font-bold shadow-md whitespace-nowrap transition-all'
            : 'px-6 py-2 rounded-full bg-white border-2 border-gray-200 text-gray-600 text-sm font-semibold hover:border-[#0175CC] hover:text-[#0175CC] whitespace-nowrap transition-all'"
        ></a>
      </div>
    </div>

    <div
      th:fragment="category-title(category)"
      class="flex items-center justify-between mb-6 border-b pb-4"
    >
      <div class="flex items-center gap-3">
        <img
          th:src="@{/images/category-icon.png}"
          alt="Category Icon"
          class="w-6 h-6 object-contain"
        />
        <h2
          class="text-2xl md:text-3xl font-bold text-gray-900"
          th:text="${category.name}"
        ></h2>
      </div>

      <a
        th:href="@{'/categories/' + ${category.id}}"
        class="text-sm font-semibold text-[#0175CC] hover:text-blue-800 transition-colors"
      >
        View All &rarr;
      </a>
    </div>

    <a
      th:fragment="product-card(product)"
      th:href="@{/products/{id}(id=${product.id})}"
      class="group relative border border-gray-200 rounded-2xl p-5 bg-white shadow-sm hover:shadow-xl hover:-translate-y-1 transition-all duration-300 ease-out flex flex-col overflow-hidden"
    >
      <div
        class="absolute inset-0 opacity-0 group-hover:opacity-100 transition duration-500 bg-gradient-to-br from-blue-50/50 via-transparent to-transparent pointer-events-none"
      ></div>

      <div
        class="flex justify-center mb-4 overflow-hidden rounded-xl bg-gray-50 aspect-square items-center p-2"
      >
        <img
          loading="lazy"
          th:src="${product.thumbnailUrl}"
          class="w-[180px] h-[180px] object-contain transition duration-500 ease-out group-hover:scale-110"
          alt="product image"
        />
      </div>

      <h3
        class="font-bold text-lg text-gray-900 line-clamp-1 transition-colors duration-300 group-hover:text-[#0175CC]"
        th:text="${product.name}"
      ></h3>

      <p
        class="text-gray-500 text-sm mt-2 line-clamp-2 flex-grow leading-relaxed"
        th:text="${product.description}"
      ></p>

      <div class="mt-4 flex justify-between items-center">
        <p
          class="text-[#0175CC] font-extrabold text-xl transform transition duration-300 group-hover:scale-105"
          th:text="|$ ${#numbers.formatDecimal(product.price, 1, 'COMMA', 2, 'POINT')}|"
        ></p>

        <span
          class="bg-gray-100 text-gray-500 p-2 rounded-full group-hover:bg-[#0175CC] group-hover:text-white transition-colors duration-300"
        >
          <svg
            xmlns="http://www.w3.org/2000/svg"
            class="h-4 w-4"
            fill="none"
            viewBox="0 0 24 24"
            stroke="currentColor"
          >
            <path
              stroke-linecap="round"
              stroke-linejoin="round"
              stroke-width="2"
              d="M9 5l7 7-7 7"
            />
          </svg>
        </span>
      </div>
    </a>
  </body>
</html>
