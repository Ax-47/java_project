<!doctype html>
<html xmlns:th="http://www.thymeleaf.org">
  <body>
    <div
      th:fragment="not-found-product"
      class="text-center py-24 bg-gray-50 rounded-2xl border border-dashed border-gray-300 mt-8"
    >
      <svg
        xmlns="http://www.w3.org/2000/svg"
        class="h-16 w-16 mx-auto text-gray-400 mb-4"
        fill="none"
        viewBox="0 0 24 24"
        stroke="currentColor"
      >
        <path
          stroke-linecap="round"
          stroke-linejoin="round"
          stroke-width="2"
          d="M20 13V6a2 2 0 00-2-2H6a2 2 0 00-2 2v7m16 0v5a2 2 0 01-2 2H6a2 2 0 01-2-2v-5m16 0h-2.586a1 1 0 00-.707.293l-2.414 2.414a1 1 0 01-.707.293h-3.172a1 1 0 01-.707-.293l-2.414-2.414A1 1 0 006.586 13H4"
        />
      </svg>
      <p class="text-gray-500 text-xl font-medium">
        ยังไม่มีสินค้าในหมวดหมู่นี้
      </p>
      <a th:href="@{/}" class="text-[#0175CC] hover:underline mt-2 inline-block"
        >กลับไปดูหมวดหมู่อื่น</a
      >
    </div>
    <div th:fragment="not-found-address" 
         class="flex flex-col items-center justify-center py-20 px-6 bg-gray-50/50 rounded-[2.5rem] border-2 border-dashed border-gray-200 w-full text-center">
        
        <div class="bg-white p-6 rounded-full shadow-sm mb-6 text-gray-300">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-16 w-16" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M17.657 16.657L13.414 20.9a1.998 1.998 0 01-2.827 0l-4.242-4.243a8 8 0 1111.314 0z" />
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M15 11a3 3 0 11-6 0 3 3 0 016 0z" />
            </svg>
        </div>
        
        <h3 class="text-2xl md:text-3xl font-black text-gray-900 mb-3">ยังไม่มีที่อยู่จัดส่งในระบบ</h3>
        
        <p class="text-gray-500 mb-8 max-w-md text-lg leading-relaxed">
            คุณยังไม่ได้เพิ่มข้อมูลที่อยู่จัดส่ง กรุณาเพิ่มที่อยู่เพื่อให้การสั่งซื้อคอมพิวเตอร์เครื่องใหม่ของคุณราบรื่นและรวดเร็วที่สุด
        </p>
        
        <a th:href="@{/addresses/create}" 
           class="inline-flex items-center gap-3 px-8 py-4 bg-[#FF6A00] text-white font-extrabold rounded-2xl hover:bg-[#e65f00] hover:-translate-y-1 transition-all duration-300 shadow-lg shadow-orange-200">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M12 4v16m8-8H4" />
            </svg>
            เพิ่มที่อยู่แรกของคุณ
        </a>
    </div>
  </body>
</html>
