<!doctype html>
<html
  xmlns:th="http://www.thymeleaf.org"
  th:replace="~{layout/main :: layout (~{::title}, ~{::section})}"
>
  <head>
    <title th:text="${product.name} + ' - I BUILD CPU'">Product Detail</title>
  </head>

  <section class="max-w-7xl mx-auto px-6 py-8 md:py-12">
    <nav class="flex mb-8 text-sm font-medium text-gray-500 items-center gap-2">
      <a th:href="@{/}" class="hover:text-[#0175CC] transition-colors">Home</a>
      <svg
        xmlns="http://www.w3.org/2000/svg"
        class="h-4 w-4"
        fill="none"
        viewBox="0 0 24 24"
        stroke="currentColor"
      >
        <path
          stroke-linecap="round"
          stroke-linejoin="round"
          stroke-width="2"
          d="M9 5l7 7-7 7"
        />
      </svg>
      <span class="text-gray-900" th:text="${product.name}">Product Name</span>
    </nav>

    <div
      th:if="${param.success}"
      id="success-alert"
      class="bg-green-50 border border-green-200 text-green-800 px-6 py-4 mb-8 rounded-2xl shadow-sm flex justify-between items-center animate-[fade-in_0.5s_ease-out]"
    >
      <div class="flex items-center gap-3">
        <div class="bg-green-100 p-2 rounded-full">
          <svg
            class="w-6 h-6 text-green-600"
            fill="none"
            stroke="currentColor"
            viewBox="0 0 24 24"
          >
            <path
              stroke-linecap="round"
              stroke-linejoin="round"
              stroke-width="2"
              d="M5 13l4 4L19 7"
            ></path>
          </svg>
        </div>
        <div>
          <h4 class="font-bold text-lg">Success!</h4>
          <p class="text-sm text-green-700">
            Your operation has been completed successfully.
          </p>
        </div>
      </div>
      <button
        onclick="
          document.getElementById('success-alert').style.display = 'none'
        "
        class="text-green-600 hover:text-green-800 bg-green-100 hover:bg-green-200 p-2 rounded-full transition-colors"
      >
        <svg
          class="w-5 h-5"
          fill="none"
          stroke="currentColor"
          viewBox="0 0 24 24"
        >
          <path
            stroke-linecap="round"
            stroke-linejoin="round"
            stroke-width="2"
            d="M6 18L18 6M6 6l12 12"
          ></path>
        </svg>
      </button>
    </div>

    <div class="grid grid-cols-1 lg:grid-cols-2 gap-12 items-start">
      <div class="space-y-4">
        <div
          class="bg-white rounded-3xl shadow-sm border border-gray-100 p-8 flex justify-center items-center h-[400px] md:h-[550px] overflow-hidden"
        >
          <img
            id="mainImage"
            th:src="${!#lists.isEmpty(product.images) ? product.images[0].large : '/images/product-mac.png'}"
            alt="Main Product"
            class="w-full h-full object-contain transition-all duration-500 ease-in-out"
          />
        </div>
        <div class="flex gap-4 overflow-x-auto pb-2 scrollbar-hide">
          <button
            th:each="img : ${product.images}"
            class="focus:outline-none group shrink-0"
            th:onclick="changeImage([[${img.large}]], this)"
          >
            <img
              th:src="${img.thumbnail}"
              class="w-20 h-20 md:w-24 md:h-24 object-cover rounded-2xl border-2 border-transparent group-hover:border-[#0175CC] transition-all opacity-70 group-hover:opacity-100 shadow-sm"
              alt="Thumbnail"
            />
          </button>
        </div>
      </div>

      <div class="flex flex-col pt-4">
        <h1
          class="text-3xl md:text-5xl font-black text-gray-900 leading-tight mb-6"
          th:text="${product.name}"
        ></h1>
        <div class="prose prose-blue text-gray-600 mb-8">
          <p
            class="text-lg leading-relaxed"
            th:text="${product.description}"
          ></p>
        </div>
        <div class="bg-blue-50/50 p-6 rounded-2xl border border-blue-100 mb-8">
          <span class="text-sm font-bold text-blue-600 uppercase tracking-wider"
            >Price</span
          >
          <p
            class="text-4xl font-black text-[#0175CC] mt-1"
            th:text="|$ ${#numbers.formatDecimal(product.price, 1, 'COMMA', 2, 'POINT')}|"
          ></p>
        </div>

        <form
          th:action="@{/products/{id}/purchase(id=${product.id})}"
          method="post"
          class="w-full mt-6"
        >
          <div class="bg-gray-50 p-6 rounded-2xl border border-gray-200 mb-6">
            <div class="flex items-center justify-between mb-4">
              <h3 class="font-bold text-gray-900">Shipping Address</h3>
              <a
                href="/addresses"
                class="text-sm font-semibold text-[#0175CC] hover:underline"
                >+ Add New</a
              >
            </div>

            <div
              th:if="${#lists.isEmpty(addresses)}"
              class="text-sm text-red-600 bg-red-50 p-4 rounded-xl border border-red-100"
            >
              You don't have any shipping addresses. Please add an address
              before purchasing.
            </div>

            <div
              th:unless="${#lists.isEmpty(addresses)}"
              class="space-y-3 max-h-60 overflow-y-auto pr-2"
            >
              <div
                th:each="addr : ${addresses}"
                class="flex items-start gap-3 p-4 bg-white border border-gray-200 rounded-xl cursor-pointer hover:border-[#0175CC] transition-colors has-[:checked]:border-[#0175CC] has-[:checked]:ring-1 has-[:checked]:ring-[#0175CC]"
              >
                <input
                  type="radio"
                  th:id="'addr-' + ${addr.id}"
                  name="addressId"
                  th:value="${addr.id}"
                  th:checked="${addr.isDefault}"
                  required
                  class="mt-1 w-4 h-4 text-[#0175CC] focus:ring-[#0175CC] border-gray-300"
                />

                <label
                  th:for="'addr-' + ${addr.id}"
                  class="flex-1 cursor-pointer"
                >
                  <div class="font-bold text-gray-900 flex items-center gap-2">
                    <span th:text="${addr.fullName}">Full Name</span>
                    <span
                      th:if="${addr.isDefault}"
                      class="bg-blue-100 text-[#0175CC] text-xs px-2 py-0.5 rounded-full font-semibold"
                      >Default</span
                    >
                  </div>
                  <div class="text-sm text-gray-600 mt-1 leading-relaxed">
                    <span th:text="${addr.phoneNumber}">Phone</span> <br />
                    <span
                      th:text="${addr.addressLine1} + ' ' + ${addr.addressLine2 != null ? addr.addressLine2 : ''}"
                      >Line 1</span
                    ><br />
                    <span
                      th:text="${addr.subDistrict} + ', ' + ${addr.district} + ', ' + ${addr.province} + ' ' + ${addr.postalCode}"
                      >City, ZIP</span
                    >
                  </div>
                </label>
              </div>
            </div>
          </div>

          <button
            type="submit"
            th:disabled="${#lists.isEmpty(addresses)}"
            th:classappend="${#lists.isEmpty(addresses)} ? 'opacity-50 cursor-not-allowed' : 'hover:bg-blue-700 hover:shadow-2xl hover:-translate-y-1'"
            class="w-full md:w-max bg-[#0175CC] text-white px-12 py-5 rounded-2xl font-bold text-xl transition-all flex items-center justify-center gap-3"
          >
            <svg
              xmlns="http://www.w3.org/2000/svg"
              class="h-6 w-6"
              fill="none"
              viewBox="0 0 24 24"
              stroke="currentColor"
            >
              <path
                stroke-linecap="round"
                stroke-linejoin="round"
                stroke-width="2"
                d="M3 3h2l.4 2M7 13h10l4-8H5.4M7 13L5.4 5M7 13l-2.293 2.293c-.63.63-.184 1.707.707 1.707H17m0 0a2 2 0 100 4 2 2 0 000-4zm-8 2a2 2 0 11-4 0 2 2 0 014 0z"
              />
            </svg>
            Purchase
          </button>
        </form>
      </div>
    </div>

    <div class="mt-16 border-t border-gray-100 pt-12">
      <h2 class="text-2xl md:text-3xl font-black text-gray-900 mb-8">
        Customer Reviews
      </h2>

      <div class="grid grid-cols-1 lg:grid-cols-3 gap-12">
        <div
          class="lg:col-span-1 bg-white p-6 md:p-8 rounded-3xl shadow-sm border border-gray-100 h-max"
        >
          <h3 id="form-title" class="text-xl font-bold text-gray-900 mb-4">
            Write a Review
          </h3>

          <form
            id="review-form"
            th:action="@{/review}"
            method="post"
            enctype="multipart/form-data"
            class="space-y-5"
          >
            <input
              type="hidden"
              id="hidden-method"
              name="_method"
              value="post"
              disabled
            />
            <input type="hidden" name="productId" th:value="${product.id}" />

            <div>
              <label class="block text-sm font-medium text-gray-700 mb-2"
                >Rating</label
              >
              <div class="flex gap-2" id="star-rating">
                <button
                  type="button"
                  class="star-btn text-gray-300 hover:text-yellow-400 focus:outline-none transition-colors"
                  data-value="1"
                >
                  <svg class="w-8 h-8 fill-current" viewBox="0 0 24 24">
                    <path
                      d="M12 .587l3.668 7.568 8.332 1.151-6.064 5.828 1.48 8.279-7.416-3.967-7.417 3.967 1.481-8.279-6.064-5.828 8.332-1.151z"
                    />
                  </svg>
                </button>
                <button
                  type="button"
                  class="star-btn text-gray-300 hover:text-yellow-400 focus:outline-none transition-colors"
                  data-value="2"
                >
                  <svg class="w-8 h-8 fill-current" viewBox="0 0 24 24">
                    <path
                      d="M12 .587l3.668 7.568 8.332 1.151-6.064 5.828 1.48 8.279-7.416-3.967-7.417 3.967 1.481-8.279-6.064-5.828 8.332-1.151z"
                    />
                  </svg>
                </button>
                <button
                  type="button"
                  class="star-btn text-gray-300 hover:text-yellow-400 focus:outline-none transition-colors"
                  data-value="3"
                >
                  <svg class="w-8 h-8 fill-current" viewBox="0 0 24 24">
                    <path
                      d="M12 .587l3.668 7.568 8.332 1.151-6.064 5.828 1.48 8.279-7.416-3.967-7.417 3.967 1.481-8.279-6.064-5.828 8.332-1.151z"
                    />
                  </svg>
                </button>
                <button
                  type="button"
                  class="star-btn text-gray-300 hover:text-yellow-400 focus:outline-none transition-colors"
                  data-value="4"
                >
                  <svg class="w-8 h-8 fill-current" viewBox="0 0 24 24">
                    <path
                      d="M12 .587l3.668 7.568 8.332 1.151-6.064 5.828 1.48 8.279-7.416-3.967-7.417 3.967 1.481-8.279-6.064-5.828 8.332-1.151z"
                    />
                  </svg>
                </button>
                <button
                  type="button"
                  class="star-btn text-gray-300 hover:text-yellow-400 focus:outline-none transition-colors"
                  data-value="5"
                >
                  <svg class="w-8 h-8 fill-current" viewBox="0 0 24 24">
                    <path
                      d="M12 .587l3.668 7.568 8.332 1.151-6.064 5.828 1.48 8.279-7.416-3.967-7.417 3.967 1.481-8.279-6.064-5.828 8.332-1.151z"
                    />
                  </svg>
                </button>
              </div>
              <input
                type="hidden"
                id="review-rating"
                name="rating"
                value="0"
                required
              />
            </div>

            <div>
              <label
                for="review-comment"
                class="block text-sm font-medium text-gray-700 mb-2"
                >Your Review</label
              >
              <textarea
                id="review-comment"
                name="comment"
                rows="4"
                class="w-full rounded-2xl border-gray-200 bg-gray-50 focus:border-[#0175CC] focus:ring-[#0175CC] p-4 text-gray-700 transition-colors resize-none"
                placeholder="What do you think about this product?"
                required
              ></textarea>
            </div>

            <div>
              <label class="block text-sm font-medium text-gray-700 mb-2"
                >Attach Images (Optional)</label
              >
              <input
                type="file"
                id="review-images"
                name="files"
                multiple
                accept="image/png, image/jpeg, image/webp"
                class="block w-full text-sm text-gray-500 file:mr-4 file:py-2 file:px-4 file:rounded-xl file:border-0 file:text-sm file:font-bold file:bg-blue-50 file:text-[#0175CC] hover:file:bg-blue-100 transition-all cursor-pointer"
              />
              <div
                id="image-preview-container"
                class="flex gap-2 mt-3 overflow-x-auto pb-2 scrollbar-hide"
              ></div>
            </div>

            <div class="flex gap-2 pt-2">
              <button
                type="submit"
                id="submit-review-btn"
                class="flex-1 bg-[#0175CC] text-white px-6 py-3.5 rounded-2xl font-bold hover:bg-blue-700 transition-colors"
              >
                Submit Review
              </button>
              <button
                type="button"
                id="cancel-edit-btn"
                onclick="cancelEdit()"
                class="hidden bg-gray-200 text-gray-700 px-6 py-3.5 rounded-2xl font-bold hover:bg-gray-300 transition-colors"
              >
                Cancel
              </button>
            </div>
          </form>
        </div>

        <div class="lg:col-span-2 space-y-6">
          <div
            th:if="${reviews == null || #lists.isEmpty(reviews.content)}"
            class="text-center py-10 bg-gray-50 rounded-3xl border border-gray-100"
          >
            <p class="text-gray-500 font-medium">
              No reviews yet. Be the first to review!
            </p>
          </div>

          <div
            th:if="${reviews != null && not #lists.isEmpty(reviews.content)}"
            th:each="review : ${reviews.content}"
            class="review-card bg-white p-6 rounded-3xl shadow-sm border border-gray-100 flex gap-4"
            th:data-review-id="${review.id}"
          >
            <div class="flex-1">
              <div class="flex items-center justify-between mb-2">
                <div class="flex items-center gap-3">
                  <img
                    th:src="${review.profileUrl != null ? review.profileUrl : '/images/default-profile.png'}"
                    class="w-12 h-12 rounded-full object-cover border-2 border-gray-100 shadow-sm"
                    alt="Profile"
                  />
                  <h4
                    class="font-bold text-gray-900"
                    th:text="${review.username != null ? review.username : 'User'}"
                  >
                    User
                  </h4>

                  <div
                    th:if="${principal != null and principal.id.toString() == review.userId.toString()}"
                    class="flex gap-3 ml-4"
                  >
                    <button
                      type="button"
                      th:data-id="${review.id}"
                      th:data-rating="${review.rating}"
                      onclick="editReview(this)"
                      class="text-sm font-semibold text-blue-500 hover:text-blue-700 transition-colors"
                    >
                      Edit
                    </button>

                    <form
                      th:action="@{/review/{id}(id=${review.id})}"
                      method="post"
                      class="inline"
                      onsubmit="
                        return confirm(
                          'Are you sure you want to delete this review?',
                        );
                      "
                    >
                      <input type="hidden" name="_method" value="delete" />
                      <input
                        type="hidden"
                        name="productId"
                        th:value="${product.id}"
                      />
                      <button
                        type="submit"
                        class="text-sm font-semibold text-red-500 hover:text-red-700 transition-colors"
                      >
                        Delete
                      </button>
                    </form>
                  </div>
                </div>

                <div class="flex">
                  <svg
                    th:each="i : ${#numbers.sequence(1, 5)}"
                    th:classappend="${i <= review.rating} ? 'text-yellow-400' : 'text-gray-300'"
                    class="w-5 h-5 fill-current"
                    viewBox="0 0 24 24"
                  >
                    <path
                      d="M12 .587l3.668 7.568 8.332 1.151-6.064 5.828 1.48 8.279-7.416-3.967-7.417 3.967 1.481-8.279-6.064-5.828 8.332-1.151z"
                    />
                  </svg>
                </div>
              </div>

              <p
                class="text-gray-600 leading-relaxed whitespace-pre-wrap review-text-content"
                th:text="${review.comment}"
              >
                Review Text
              </p>
              <div
                class="review-image-gallery flex gap-3 mt-4 overflow-x-auto pb-2 scrollbar-hide"
              ></div>
            </div>
          </div>
        </div>
      </div>
    </div>

    <script th:inline="javascript">
      function changeImage(url, element) {
        const mainImg = document.getElementById("mainImage");
        mainImg.style.opacity = "0";
        setTimeout(() => {
          mainImg.src = url;
          mainImg.style.opacity = "1";
        }, 200);
      }

      document.addEventListener("DOMContentLoaded", () => {
        const stars = document.querySelectorAll(".star-btn");
        const reviewForm = document.getElementById("review-form");
        const imageInput = document.getElementById("review-images");
        const previewContainer = document.getElementById(
          "image-preview-container",
        );

        // --- ระบบดาว ---
        function updateStarUI(rating) {
          const selectedRating = parseInt(rating);
          document.getElementById("review-rating").value = selectedRating;
          stars.forEach((s, index) => {
            if (index < selectedRating) {
              s.classList.remove("text-gray-300");
              s.classList.add("text-yellow-400");
            } else {
              s.classList.remove("text-yellow-400");
              s.classList.add("text-gray-300");
            }
          });
        }

        stars.forEach((star) => {
          star.addEventListener("click", (e) => {
            updateStarUI(e.currentTarget.getAttribute("data-value"));
          });
        });

        // --- พรีวิวรูป ---
        imageInput.addEventListener("change", function () {
          previewContainer.innerHTML = "";
          Array.from(this.files).forEach((file) => {
            const reader = new FileReader();
            reader.onload = (e) => {
              previewContainer.innerHTML += `<img src="${e.target.result}" class="w-16 h-16 object-cover rounded-xl border border-gray-200 shadow-sm shrink-0" />`;
            };
            reader.readAsDataURL(file);
          });
        });

        document.querySelectorAll(".review-card").forEach(async (card) => {
          const reviewId = card.getAttribute("data-review-id");
          const gallery = card.querySelector(".review-image-gallery");
          try {
            const res = await fetch(`/api/review/${reviewId}/images`);
            if (res.ok) {
              const images = await res.json();
              images.forEach((img) => {
                if (img.large) {
                  gallery.innerHTML += `<img src="${img.large}" class="w-48 h-48 md:w-64 md:h-64 object-cover rounded-2xl border border-gray-100 shadow-sm cursor-pointer hover:opacity-80 transition-opacity shrink-0" onclick="window.open('${img.large}', '_blank')" alt="Review Image" />`;
                }
              });
            }
          } catch (e) {
            console.error(e);
          }
        });

        window.editReview = function (btnElement) {
          const reviewId = btnElement.getAttribute("data-id");
          const rating = btnElement.getAttribute("data-rating");
          const reviewCard = btnElement.closest(".review-card");
          const commentText = reviewCard.querySelector(
            ".review-text-content",
          ).innerText;

          document.getElementById("review-comment").value = commentText;
          updateStarUI(rating);
          imageInput.value = "";
          previewContainer.innerHTML = "";

          reviewForm.action = `/review/${reviewId}`;
          const hiddenMethod = document.getElementById("hidden-method");
          hiddenMethod.value = "put";
          hiddenMethod.disabled = false;

          document.getElementById("form-title").innerText = "Edit Your Review";
          document.getElementById("submit-review-btn").innerText =
            "Update Review";
          document.getElementById("cancel-edit-btn").classList.remove("hidden");
          document
            .getElementById("form-title")
            .scrollIntoView({ behavior: "smooth", block: "center" });
        };

        window.cancelEdit = function () {
          reviewForm.action = `/review`;
          const hiddenMethod = document.getElementById("hidden-method");
          hiddenMethod.value = "post";
          hiddenMethod.disabled = true;

          document.getElementById("form-title").innerText = "Write a Review";
          document.getElementById("submit-review-btn").innerText =
            "Submit Review";
          document.getElementById("cancel-edit-btn").classList.add("hidden");
          reviewForm.reset();
          previewContainer.innerHTML = "";
          updateStarUI(0);
        };
      });
    </script>
  </section>
</html>
