<!doctype html>
<html
  xmlns:th="http://www.thymeleaf.org"
  th:replace="~{layout/main :: layout (~{::title}, ~{::section})}"
>
  <head>
    <title>Home - I BUILD CPU</title>
  </head>

  <section class="max-w-7xl mx-auto px-6 py-8">
    <div
      th:replace="~{fragments/productCard :: category-nav(${categories}, ${activeCategoryId})}"
    ></div>

    <div th:if="${categories != null}">
      <div
        th:each="category : ${categories}"
        class="py-10"
        th:if="${activeCategoryId ==null ||category.id ==activeCategoryId}"
      >
        <div
          th:replace="~{fragments/productCard :: category-title(${category})}"
        ></div>
        <div
          class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-6 md:gap-8"
        >
          <th:block th:each="product : ${category.products}">
            <div
              th:replace="~{fragments/productCard :: product-card(${product})}"
            ></div>
          </th:block>
        </div>
        <div th:if="${activeCategoryId !=null &&category.id ==activeCategoryId &&#lists.isEmpty(category.products)}" class="mt-10">
          <div th:replace="~{fragments/notFound :: not-found-product}"></div>
        </div>

        <div th:if="${#lists.isEmpty(categories)}" class="mt-10">
          <div th:replace="~{fragments/notFound :: not-found-product}"></div>
        </div>
      </div>
    </div>
  </section>
</html>
