<!doctype html>
<html
  xmlns:th="http://www.thymeleaf.org"
  th:replace="~{layout/main :: layout (~{::title}, ~{::section})}"
>
  <head>
    <title>ข้อมูลส่วนตัว - I BUILD CPU</title>
  </head>
  <body>
    <section class="max-w-5xl mx-auto px-4 sm:px-6 lg:px-8 py-10">
      
      <input type="hidden" id="current-user-id" th:value="${principal != null ? principal.id : '1'}" />

      <div class="relative mb-8">
        
        <div id="bg-dropzone" class="w-full h-64 md:h-80 rounded-3xl overflow-hidden shadow-2xl relative group transition-all duration-300">
          
          <img
            id="bg-preview"
            th:src="${detail.backgroundUrl != null ? detail.backgroundUrl : '/images/default-bg.jpg'}"
            class="w-full h-full object-cover group-hover:scale-105 transition-transform duration-700 ease-in-out"
            alt="Cover"
          />
          <div class="absolute inset-0 bg-gradient-to-t from-gray-900/80 via-gray-900/20 to-transparent pointer-events-none"></div>
          
          <div id="drag-overlay" class="absolute inset-0 bg-blue-500/80 backdrop-blur-sm hidden flex-col items-center justify-center z-30 transition-all duration-300">
            <div class="border-4 border-dashed border-white rounded-2xl p-8 text-center pointer-events-none">
              <span class="text-white text-2xl font-black drop-shadow-md">วางรูปภาพที่นี่เพื่อเปลี่ยนหน้าปก</span>
            </div>
          </div>

          <label for="bg-upload" class="absolute top-4 right-4 bg-black/40 hover:bg-black/60 backdrop-blur-md text-white px-4 py-2.5 rounded-2xl cursor-pointer transition-all flex items-center gap-2 z-20 border border-white/20 shadow-lg cursor-pointer">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 9a2 2 0 012-2h.93a2 2 0 001.664-.89l.812-1.22A2 2 0 0110.07 4h3.86a2 2 0 011.664.89l.812 1.22A2 2 0 0018.07 7H19a2 2 0 012 2v9a2 2 0 01-2 2H5a2 2 0 01-2-2V9z" />
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 13a3 3 0 11-6 0 3 3 0 016 0z" />
            </svg>
            <span id="bg-upload-text" class="text-sm font-semibold hidden md:block">เปลี่ยนรูปปก</span>
            <input type="file" id="bg-upload" class="hidden" accept="image/png, image/jpeg, image/webp" />
          </label>
        </div>

        <div class="relative -mt-24 mx-4 md:mx-10 bg-white/95 backdrop-blur-xl rounded-3xl p-6 md:p-8 shadow-[0_8px_30px_rgb(0,0,0,0.08)] ring-1 ring-gray-100 flex flex-col md:flex-row items-center gap-6 md:gap-8 z-10">
          
          <div class="shrink-0 relative -mt-20 md:mt-0 group">
            <img
              id="profile-preview"
              th:src="${detail.profileUrl != null ? detail.profileUrl : '/images/profile-pic.png'}"
              class="w-32 h-32 md:w-40 md:h-40 rounded-3xl object-cover bg-white shadow-xl ring-4 ring-white transition-opacity group-hover:opacity-90"
            />
            
            <label for="profile-upload" class="absolute -bottom-2 -right-2 bg-gray-800 hover:bg-gray-900 text-white p-2.5 rounded-xl cursor-pointer shadow-lg ring-4 ring-white transition-transform hover:scale-110 z-20">
              <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 9a2 2 0 012-2h.93a2 2 0 001.664-.89l.812-1.22A2 2 0 0110.07 4h3.86a2 2 0 011.664.89l.812 1.22A2 2 0 0018.07 7H19a2 2 0 012 2v9a2 2 0 01-2 2H5a2 2 0 01-2-2V9z" />
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 13a3 3 0 11-6 0 3 3 0 016 0z" />
              </svg>
              <input type="file" id="profile-upload" class="hidden" accept="image/png, image/jpeg, image/webp" />
            </label>
          </div>

          <div class="flex-1 text-center md:text-left">
            <div class="flex flex-col md:flex-row items-center gap-3">
              <h1 class="text-3xl md:text-4xl font-black text-gray-900 tracking-tight" th:text="${principal.username}">UserName</h1>
            </div>
            <p class="text-gray-500 font-medium mt-2">สมาชิกของ I BUILD CPU</p>
          </div>
        </div>
      </div>

      <script>
        console.log("Script loaded!"); // บรรทัดนี้ช่วยเช็กว่า JS ทำงานหรือยัง ลองดูใน F12 Console

        document.addEventListener('DOMContentLoaded', () => {
          console.log("DOM loaded! กำลังผูก Event...");
          
          const dropZone = document.getElementById('bg-dropzone');
          const dragOverlay = document.getElementById('drag-overlay');
          const bgUploadInput = document.getElementById('bg-upload');
          const bgPreview = document.getElementById('bg-preview');
          const bgUploadText = document.getElementById('bg-upload-text');

          const profileUploadInput = document.getElementById('profile-upload');
          const profilePreview = document.getElementById('profile-preview');
          
          const userIdInput = document.getElementById('current-user-id');
          const userId = userIdInput ? userIdInput.value : '1'; 

          // เช็กก่อนว่ามี Element ครบไหม
          if (!profileUploadInput || !bgUploadInput) {
            console.error("หา Input อัปโหลดไม่เจอ!");
            return;
          }

          // === โปรไฟล์ ===
          profileUploadInput.addEventListener('change', async function() {
            console.log("มีการเลือกไฟล์รูปโปรไฟล์");
            if (this.files && this.files[0]) {
              const file = this.files[0];
              
              const reader = new FileReader();
              reader.onload = function(e) {
                profilePreview.src = e.target.result;
              }
              reader.readAsDataURL(file);
              
              const formData = new FormData();
              formData.append('file', file); 

              try {
                const response = await fetch(`/api/users/${userId}/profile`, {
                  method: 'POST', 
                  body: formData
                });
                console.log("Response Profile:", response);
              } catch (error) {
                console.error('Network Error Profile:', error);
              } finally {
                this.value = ''; 
              }
            }
          });

          // === หน้าปก ===
          if(dropZone) {
            ['dragenter', 'dragover', 'dragleave', 'drop'].forEach(eventName => {
              dropZone.addEventListener(eventName, e => {
                e.preventDefault();
                e.stopPropagation();
              }, false);
            });

            dropZone.addEventListener('drop', (e) => {
              console.log("มีการ Drop ไฟล์หน้าปก");
              const dt = e.dataTransfer;
              if (dt.files.length > 0) handleBgFile(dt.files[0]);
            });
          }

          bgUploadInput.addEventListener('change', function() {
            console.log("มีการเลือกไฟล์รูปหน้าปกผ่านการคลิก");
            if (this.files.length > 0) handleBgFile(this.files[0]);
          });

          function handleBgFile(file) {
            if (!file.type.startsWith('image/')) return;
            const reader = new FileReader();
            reader.onload = (e) => bgPreview.src = e.target.result;
            reader.readAsDataURL(file);
            uploadBgToServer(file);
          }

          async function uploadBgToServer(file) {
            const formData = new FormData();
            formData.append('file', file); 
            if(bgUploadText) bgUploadText.innerText = 'กำลังอัปโหลด...';

            try {
              const response = await fetch(`/api/users/${userId}/background`, {
                method: 'POST', 
                body: formData
              });
              console.log("Response BG:", response);
            } catch (error) {
              console.error('Network Error BG:', error);
            } finally {
              if(bgUploadText) bgUploadText.innerText = 'เปลี่ยนรูปปก';
              bgUploadInput.value = ''; 
            }
          }

        });
      </script>
    </section>
  </body>
</html>
