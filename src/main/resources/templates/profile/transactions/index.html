<!doctype html>
<html
  xmlns:th="http://www.thymeleaf.org"
  th:replace="~{layout/main :: layout (~{::title}, ~{::section})}"
>
  <head>
    <title>Transaction History - I BUILD CPU</title>
  </head>

  <section class="max-w-4xl mx-auto px-6 py-8 md:py-12">
    <nav class="flex mb-8 text-sm font-medium text-gray-500 items-center gap-2">
      <a th:href="@{/}" class="hover:text-[#0175CC] transition-colors">Home</a>
      <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7" />
      </svg>
      <a th:href="@{/profile}" class="hover:text-[#0175CC] transition-colors">Profile</a>
      <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7" />
      </svg>
      <span class="text-gray-900">Transaction History</span>
    </nav>

    <div class="flex items-center justify-between mb-8">
      <h1 class="text-3xl md:text-4xl font-black text-gray-900 tracking-tight">Transactions</h1>
      <a th:href="@{/topup}" class="bg-[#0175CC] text-white px-5 py-2.5 rounded-xl font-bold text-sm hover:bg-blue-700 transition-colors shadow-sm">
        + Top Up Credit
      </a>
    </div>

    <div th:if="${transactions == null || #lists.isEmpty(transactions.content)}" class="bg-gray-50 border border-gray-100 rounded-3xl p-12 text-center">
      <div class="w-16 h-16 bg-gray-200 rounded-full flex items-center justify-center mx-auto mb-4">
        <svg class="w-8 h-8 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"></path>
        </svg>
      </div>
      <h3 class="text-lg font-bold text-gray-900 mb-1">No transactions yet</h3>
      <p class="text-gray-500">When you buy a product or top up, it will appear here.</p>
    </div>

    <div th:if="${transactions != null && not #lists.isEmpty(transactions.content)}" class="space-y-4">
      
      <div th:each="tx : ${transactions.content}" class="bg-white p-5 md:p-6 rounded-2xl border border-gray-100 shadow-sm flex items-center gap-4 hover:shadow-md transition-shadow">
        
        <div th:if="${tx.type == 'PURCHASE'}" class="w-12 h-12 rounded-full bg-red-50 text-red-500 flex items-center justify-center shrink-0">
          <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 11V7a4 4 0 00-8 0v4M5 9h14l1 12H4L5 9z"></path>
          </svg>
        </div>
        <div th:if="${tx.type== 'TOPUP'}" class="w-12 h-12 rounded-full bg-green-50 text-green-500 flex items-center justify-center shrink-0">
          <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 6v6m0 0v6m0-6h6m-6 0H6"></path>
          </svg>
        </div>

        <div class="flex-1 min-w-0">
          <div class="flex items-center gap-2 mb-1">
            <h4 class="font-bold text-gray-900 truncate" th:text="${tx.type == 'PURCHASE' ? 'Purchase Product' : 'Top Up Credit'}">
              Transaction Type
            </h4>
            <span th:if="${tx.status == 'SUCCEED'}" class="bg-green-100 text-green-700 text-[10px] px-2 py-0.5 rounded-full font-bold tracking-wide">SUCCESS</span>
            <span th:if="${tx.status == 'FAILED'}" class="bg-red-100 text-red-700 text-[10px] px-2 py-0.5 rounded-full font-bold tracking-wide">FAILED</span>
          </div>
          
          <div class="text-sm text-gray-500 flex flex-col md:flex-row md:gap-4">
            <span class="flex items-center gap-1">
              <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z"></path></svg>
              <span th:text="${#temporals.format(tx.createdAt, 'dd MMM yyyy, HH:mm')}">Date</span>
            </span>
            
            <span th:if="${tx.type == 'PURCHASE' }" class="truncate text-gray-400">
              Order: <span th:text="${tx.orderId}">id</span>
            </span>
            <span th:if="${tx.type == 'TOPUP' }" class="truncate text-gray-400">
              Via: <span th:text="${tx.method}">Method</span>
            </span>
          </div>
        </div>

        <div class="text-right shrink-0">
          <p th:class="${tx.type == 'PURCHASE'} ? 'text-lg font-black text-red-600' : 'text-lg font-black text-green-600'"
             th:text="${tx.type == 'PURCHASE' ? '-' : '+'} + '$ ' + ${#numbers.formatDecimal(tx.amount, 1, 'COMMA', 2, 'POINT')}">
            $ 0.00
          </p>
        </div>
        
      </div>
    </div>

    <div th:if="${transactions != null and transactions.totalPages > 1}" class="flex justify-center items-center gap-4 mt-8 pt-6">
       </div>

  </section>
</html>
