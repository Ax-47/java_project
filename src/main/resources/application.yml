---
server:
  port: ${SPRING_PORT:9000}
logging:
  level:
    org.springframework.security: DEBUG
# springdoc:
#   api-docs:
#     enabled: false
#   swagger-ui:
#     enabled: false
token:
  # Default: 1 Hour
  access-token-expired-in-seconds: ${ACCESS_TOKEN_EXP_SEC:3600}
  # Default: 1 Month
  refresh-token-expired-in-seconds: ${REFRESH_TOKEN_EXP_SEC:2592000}
minio:
  url: ${MINIO_URL:http://localhost:9100}
  access-key: ${MINIO_ACCESS_KEY:minioadmin}
  secret-key: ${MINIO_SECRET_KEY:minioadmin}
  bucket: ${MINIO_BUCKET:images}
spring:
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB
  profiles:
    active: ${PROFILE:dev}
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/restdb}
    username: ${DB_USER:restuser}
    password: ${DB_PASS:restpass}

  jpa:
    hibernate:
      ddl-auto: update
